name: Release Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag for a manual build
        required: true
        default: edge
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push multi-platform image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Select container registries
        id: registries
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          images="ghcr.io/${GITHUB_REPOSITORY,,}"
          dockerhub=false

          if [[ -n "$DOCKERHUB_USERNAME" || -n "$DOCKERHUB_TOKEN" ]]; then
            if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
              echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be configured together."
              exit 1
            fi

            images+=$'\n'"${DOCKERHUB_USERNAME}/nanocount"
            dockerhub=true
          fi

          {
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
            echo "dockerhub=$dockerhub"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.registries.outputs.dockerhub == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Nanocount
            org.opencontainers.image.description=Lightweight, privacy-friendly website page-view counter
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Publish build summary
        shell: bash
        run: |
          {
            echo "## Nanocount Docker image"
            echo
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "### Published tags"
            echo '```text'
            echo '${{ steps.meta.outputs.tags }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
